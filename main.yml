name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Python syntax
        run: python -m py_compile reading_list.py

      - name: Send Discord Notification (Build)
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \" Build finalizado! Status: ${{ job.status }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Simulate deployment
        run: echo "Deploy realizado com sucesso!"

      - name: Send Discord Notification (Deploy)
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \" Deploy finalizado! Status: ${{ job.status }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
